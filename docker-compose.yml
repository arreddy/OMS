services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oms
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms
    ports:
      - "5432:5432"
    volumes:
      - oms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms -d oms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oms-postgres-data:
